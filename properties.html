<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties - Kigali Estates</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <h1>Our Properties</h1>
      <p>Browse available properties for sale and rent across Rwanda</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="filters-bar">
        <div class="filter-group">
          <label>Search</label>
          <input type="text" id="filterSearch" placeholder="Search by name or location...">
        </div>
        <div class="filter-group">
          <label>Status</label>
          <select id="filterStatus">
            <option value="">All</option>
            <option value="sale">For Sale</option>
            <option value="rent">For Rent</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Type</label>
          <select id="filterType">
            <option value="">All Types</option>
            <option value="house">House</option>
            <option value="apartment">Apartment</option>
            <option value="land">Land</option>
            <option value="commercial">Commercial</option>
          </select>
        </div>
        <div class="filter-group">
          <label>District</label>
          <select id="filterDistrict">
            <option value="">All Districts</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Min Price</label>
          <input type="number" id="filterMinPrice" placeholder="Min RWF">
        </div>
        <div class="filter-group">
          <label>Max Price</label>
          <input type="number" id="filterMaxPrice" placeholder="Max RWF">
        </div>
        <button class="btn btn-primary" onclick="applyFilters()">Filter</button>
        <button class="btn btn-outline" onclick="clearFilters()">Clear</button>
      </div>

      <p id="resultsCount" style="margin-bottom:20px; color: var(--gray); font-size:14px;"></p>
      <div class="properties-grid" id="propertiesList"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
  <script>
    let allProperties = [];

    getDistricts().forEach(d => {
      document.getElementById('filterDistrict').innerHTML += `<option value="${d}">${d}</option>`;
    });

    const urlParams = getUrlParams();
    if (urlParams.status) document.getElementById('filterStatus').value = urlParams.status;
    if (urlParams.type) document.getElementById('filterType').value = urlParams.type;
    if (urlParams.district) document.getElementById('filterDistrict').value = urlParams.district;
    if (urlParams.maxPrice) document.getElementById('filterMaxPrice').value = urlParams.maxPrice;
    if (urlParams.search) document.getElementById('filterSearch').value = urlParams.search;

    function applyFilters() {
      const filters = {
        search: document.getElementById('filterSearch').value,
        status: document.getElementById('filterStatus').value,
        type: document.getElementById('filterType').value,
        district: document.getElementById('filterDistrict').value,
        minPrice: document.getElementById('filterMinPrice').value,
        maxPrice: document.getElementById('filterMaxPrice').value
      };
      const filtered = filterProperties(allProperties, filters);
      renderPropertiesGrid(filtered, 'propertiesList');
      document.getElementById('resultsCount').textContent = `Showing ${filtered.length} propert${filtered.length === 1 ? 'y' : 'ies'}`;
    }

    function clearFilters() {
      ['filterSearch','filterStatus','filterType','filterDistrict','filterMinPrice','filterMaxPrice'].forEach(id => document.getElementById(id).value = '');
      applyFilters();
    }

    (async () => {
      await initPage('properties.html');
      allProperties = await getProperties();
      applyFilters();
    })();

    document.getElementById('filterSearch').addEventListener('input', applyFilters);
    document.getElementById('filterStatus').addEventListener('change', applyFilters);
    document.getElementById('filterType').addEventListener('change', applyFilters);
    document.getElementById('filterDistrict').addEventListener('change', applyFilters);
  </script>
</body>
</html>
